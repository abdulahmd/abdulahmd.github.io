    const resumeTab = document.getElementById('resume-tab');

          `;
          break;
        case 'blogs-tab':
          contentDiv.innerHTML = `
            <div class="text-center">
              <h2 class="text-3xl font-semibold mb-6">My Blogs</h2>
              <div class="space-y-6">
                <div class="blog-item">
                  <h3 class="font-semibold text-xl">Landing | 4/21/2025</h3>
                  <a href="#" class="read-more-btn" onclick="toggleContent(event, this)">Read More</a>
                  <div class="dropdown-content">
                    <p>It feels as though ISM has just started though now, the final presentation has concluded as we wrap up the year. Of course, I was really nervous the day of final presentation night as all I could think about was my speech. However, something dawned on me once all the guests entered the room: I remembered that I spent the year preparing for this and now I was the expert in the room. Given how long it took for me to prepare my product, it made sense for me to present myself confidently and professionally. Thus, when I began my speech, my main concern wasn’t what the audience would think about me if I messed up, but how I can give the audience the opportunity of getting a glimpse of what I’ve learned throughout the year in half an hour. After I finished my presentation, the first thing I thought of was the very first ISM speech I gave about myself. I compared how I presented that speech to how I presented a longer speech over a topic I just learned that year, and noticed how far I’ve gotten in terms of my professionalism. No doubt, if anyone were to ask me about the greatest end product I got from ISM, it wouldn’t be my work or the research I did, it would be public speaking abilities and confidence I gained. Anyone can become an expert in their field, but it takes a real professional to bring themselves down to a layman level and show the importance of their work. </p>
                  </div>
                </div>
                <div class="blog-item">
                  <h3 class="font-semibold text-xl">Preparing for final presentation | 4/14/2025</h3>
                  <a href="#" class="read-more-btn" onclick="toggleContent(event, this)">Read More</a>
                  <div class="dropdown-content">
                    <p>It’s currently the last week before final presentation night and I’ve wrapped up my final product and am getting everything ready for that final presentation. That includes setting up the powerpoint with a professional aesthetic along with creating slides for my final product as well. While it is slightly challenging to get everything ready, I’m still very excited for the final presentation night so that I can display the fruits of my labor in terms of how an audience of people not so familiar with drone engineering react to my original work and final product. Currently, I’ve finished up on my presentation and am now working to get my trifold updated for my final product so that the audience during the final presentation night have a second medium to view what I’ve worked so hard on throughout the year. In terms of my trifold, I also need to find a good way to position my drone so that it doesn’t cover any necessary information on my board while still attracting a good amount of attention from the audience. All in all, I’m hoping that the reaction to my work is overall positive and that my presentation will be a success.</p>
                  </div>
                </div>
                <div class="blog-item">
                  <h3 class="font-semibold text-xl">The Big Premiere | 3/31/2025</h3>
                  <a href="#" class="read-more-btn" onclick="toggleContent(event, this)">Read More</a>
                  <div class="dropdown-content">
                    <p>After attaining a mentor for my drone control project, I was able to speak with Dr. Esam Obiedat a little bit more about his experience with unmanned aerial vehicles, relating it back to my drone work. He told me about his PhD and research experience with UAVs in order to give me some guidance for the remainder of my ISM journey. Having such a valuable resource directly from my home robotics team has made my remaining work easier than it was from calling multiple varying professionals and introducing each of them to my project every single time. In terms of what I was able to accomplish through in class assignments this past week, I was able to create a flier and program brochure, ready to distribute to the guests for my final presentation night. Given that this is the final stretch before I present what I’ve worked on throughout the year, I’m having mixed emotions about my presentation (both excited to present, yet nervous nevertheless). Therefore, I’m hoping in the coming weeks to really upgrade my trifold to encompass what I’ve accomplished for my final product as well as including the professionals I’ve worked with for my drone project. I also want to try to incorporate an idea I had for my original work presentation which I never got to do, which is attaching an ipad to run my presentation on my trifold as my drone is taking up a lot of the space on the bottom of the board where my laptop would typically go. All in all, I’m excited for what’s to come and will do my best to make my final presentation a success.
</p>
                  </div>
                </div>
                <div class="blog-item">
                  <h3 class="font-semibold text-xl">The Final Stretch | 3/24/2025</h3>
                  <a href="#" class="read-more-btn" onclick="toggleContent(event, this)">Read More</a>
                  <div class="dropdown-content">
                    <p>While we were on Spring Break, I spent time getting the bare essentials for my project ready. This included doing a few more interviews along with finalizing on my mentor. Right before Spring Break began, I reached out to numerous individuals in the field of drone control till I finally got a response from one professional named Mr. Christopher Hartman. Mr Hartman gave me guidance on what materials to add to my drone. I told him about my plan to coat it in a PETG casing which he found to be a great idea. In addition to this, he talked to me about simplifying my approach for the pathing aspect of my drone to have it run a grid as a sort of introduction to autonomous drone pathing rather than a full RRT* algorithm. I also had the pleasure of finalizing a mentor out of the interviews I had. I chose my robotics mentor, Dr. Obiedat who had his PhD in electrical and control engineering. As part of his own research studies, he’s worked with UAVs, (unmanned aerial vehicles) as a PhD student. The fact that he’s had so much experience within the field of aerospace engineering and the fact that I work so closely with him made the perfect fit for mentoring my project. 
</p>
                  </div>
                </div>
                <div class="blog-item">
                  <h3 class="font-semibold text-xl">Getting my project down to a science, and a mentor | 2/24/2025</h3>
                  <a href="#" class="read-more-btn" onclick="toggleContent(event, this)">Read More</a>
                  <div class="dropdown-content">
                    <p>This past week, I’ve been working on completing more research for my project. This included learning about new path variations I could use for my drone such as a mathematical concept known as Bezier Curves. With Bezier Curves, I can path my drone to go through a series of multiple control points in swift motions while still working accurately and safely. Combining this with an RRT* algorithm will make my results more statistically significant and thereby increase the effectiveness of my drone’s autonomous pathing and CO2 data. In terms of actually working on my project, I was able to tune the PID (control algorithm) for my drone to allow it to move to different positions on its own, what’s next is actually coding the algorithm for it to path in different open environments and complete successful autonomous flights. I hope to get this done in the 2 months that I have left alongside one of two potential mentors that I’ve been in contact with about my project. This weekend, I plan to finalize which mentor I will be going with so that I can gain guidance on the programming aspect of my final product. All in all, my plan is to finish programming my drone before April, and hopefully have it done even quicker alongside a mentor.
</p>
                  </div>
                </div>
                <div class="blog-item">
                  <h3 class="font-semibold text-xl">Diving Into My Work | 2/10/2025</h3>
                  <a href="#" class="read-more-btn" onclick="toggleContent(event, this)">Read More</a>
                  <div class="dropdown-content">
                    <p>Since my last blog post, I’ve been able to get substantial work done on my drone and research regarding it. For starters, I was able to complete the CAD (computer aided design) for a drone casing to provide a layer of protection for my drone. The steps following this would be fitting the casing to precise measurements for my drone frame. In addition to this, I’ve completed research on which specific pure pursuit algorithms to implement for my drone. So far, I’ve landed on the RRT* Algorithm based on my latest research assessment. The goal of this is to get the area that the drone needs to traverse, and then traverse the area randomly (while still being safe) to make my CO₂ data as accurate as possible. My plans from here are to finalize my mentor where I’ll hold a meeting with the professional I’ve been working with, formally asking him to become my official ISM Mentor. Now having done the research and being very close to finalizing with my mentor, the time to start programming is approaching. For this, I’ll start off by making sure the CO₂ sensor works as intended and then moving on to the main aspect of my final product: autonomous flight. 
</p>
                  </div>
                </div>
                <div class="blog-item">
                  <h3 class="font-semibold text-xl">Finalizing Flight Plans | 2/03/2025</h3>
                  <a href="#" class="read-more-btn" onclick="toggleContent(event, this)">Read More</a>
                  <div class="dropdown-content">
                    <p>This past week, I focused on finalizing my final product plan for my drone project. Currently, my plan is to finish and print a drone casing for my drone out of carbon fiber to protect valuable hardware. Afterwards, I plan to start programming my drone to read carbon dioxide levels from different areas to ensure it gives accurate data for my work. Finally, I’ll finish off by programming my drone to run autonomous paths while reading carbon dioxide levels in an area. What I’ve done so far to accomplish this goal is that I’ve been researching different implications of autonomous drones in environmental settings and different ways to model pathing for autonomous drones. For example, there is a path tracking algorithm known as Pure Pursuit which checks for a look ahead (destination) point and a predetermined path. The system then creates a series of bezier curves to find the most accurate and fastest way to get to the destination. Implementing a Pure Pursuit algorithm to path, combined with reading carbon dioxide levels and giving data at the end of the path for average reading levels, will ensure I have a working final product. From here, the best course of action would be to speak with a potential mentor to check my progress from time to time and advise me on my work. 
</p>
                  </div>
                </div>
                <div class="blog-item">
                  <h3 class="font-semibold text-xl">Flying to new heights | 1/27/2025</h3>
                  <a href="#" class="read-more-btn" onclick="toggleContent(event, this)">Read More</a>
                  <div class="dropdown-content">
                    <p>These past few weeks, I’ve been testing my drone ensuring the hardware functioned well. The fact that it did manage to work is a testament to my hard work this past semester to get the hardware portion of my project completed. I’ve also been reviewing my previous research assessments trying to retain as much information on how professionals have programmed autonomous drones in order to guide myself while working on my final product. In addition to this, I’ve been able to present my original work in a professional setting to those not entirely familiar with drone control or general engineering. Overall, seeing the reactions of people at the ISM Gallery Walk really showed how interested people were with engineering when they got to actually see it in action. I had many people come up to me asking interesting questions about the obstacles I faced when creating my product and even recommending different implications for my drone. Overall, it was nice to get a new perspective on my project from people who weren’t engineers themselves. Additionally, setting up my trifold was also an excellent display of the knowledge I’ve gained on drone control throughout the first semester. All in all, beginning work on my final product, creating a display on my original work, and presenting my original work were great ways to reflect and grow upon my ISM journey.
</p>
                  </div>
                </div>
                <div class="blog-item">
                  <h3 class="font-semibold text-xl">Soaring Like a Hawk | 11/22/2024</h3>
                  <a href="#" class="read-more-btn" onclick="toggleContent(event, this)">Read More</a>
                  <div class="dropdown-content">
                    <p>After completing an interview with another individual from Lockheed Martin-Aero that specialized in vehicle aerodynamics and rotary crafts, I realized just how important it was to receive feedback from different types of aerial engineers, not just ones that solely work with specific subcategories like control or system design. From this interview I gained insight on the effectiveness of attaching an aluminum encasing on a drone. His main point was that autonomous functionalities would be difficult with any sort of metal taking up a major portion of my drone. Despite the fact that he wasn’t experienced with the type of drone I was using, (A 4-axis drone (4 motors in a cross)) I researched his claim online and realized that since Pixhawks autotune at flight start, having such a heavy concentration of metal can actually mess up the compass calibration by a noticeable amount to the point that the orientation (yaw in technical terms) can mess up completely. Besides the interview, I’ve been working on a research assessment with a research paper that fits very well with my original work. The paper focuses on agricultural data gathering operations that were completed with an autonomous drone. All in all, these past few weeks have been filled with me learning more about my topic and recognizing potential issues before I begin to apply them.
</p>
                  </div>
                </div>
                <div class="blog-item">
                  <h3 class="font-semibold text-xl">Connecting what I've learned | 11/10/2024</h3>
                  <a href="#" class="read-more-btn" onclick="toggleContent(event, this)">Read More</a>
                  <div class="dropdown-content">
                    <p>This week, I spent time keeping in touch per the request of a  previous professional I interviewed. My interviewer works for Unscrewed Aerospace, a company that specializes in autonomous drone solutions for other companies. During the interview I got to work building my drone prototype and tuning it to finally get it up and running in the air. This week exemplified the research I’ve done thus far in the year through ISM, as I was able to culminate my knowledge into a product. Having no experience with drones, I was forced to apply what I learned thus far from work and extracurricular experiences, namely robotics. While I came across issues such as motors entirely not working properly, the ability to troubleshoot engineering issues is something that remains constant between both robotics and drone engineering so that is exactly what I did. From there, I went to the local neighborhood park and got to testing. I was finally able to master an automated landing sequence that ensured my drone would not crash once it finished its duties. From being able to interview someone that specializes in the field of my project to creating something that I lacked the skills to formulate, I learned one thing: being able to connect my current skills to whatever project I’m working on in order to get a successful end product. In my case, I used the ISM interviewing experience I gained thus far in the year along with my previously mentioned robotics experience.
</p>
                  </div>
                </div>
                <div class="blog-item">
                  <h3 class="font-semibold text-xl">Finding common ground ... in the sky | 10/28/2024</h3>
                  <a href="#" class="read-more-btn" onclick="toggleContent(event, this)">Read More</a>
                  <div class="dropdown-content">
                    <p>Last week, I was able to partake in my first professional ISM interview over aeronautical engineering. My interviewer works at Lockheed Martin (The US Military-Industrial Company) where he focuses on missile defense systems as a Project Manager and Software Engineer. We were able to discuss how Lockheed Martin has contributed to the aeronautical & aerospace defense industry and the implications that has in my project. He also brought up specific departments (Such as Lockheed Martin Aero in Fort Worth) that focus on rotary drone development which would align with my work. From this interview, I was able to learn that despite differences in two people’s fields, you can still learn a lot from the similarities between both fields and gain valuable connections that are closer to your specialization. In addition to interviewing, I completed an introduction assignment to my original work where I detailed my plan for this upcoming 9 weeks. Right now, my plan is to create a drone that can run autonomously in response to environmental disturbances along with using AI camera operations to detect obscurities in the environment. I’m currently waiting for my control for the drone to arrive to get an early start on my code. In addition to this, I hope to complete a series of interviews to find a mentor that can assist me in figuring out optimal control mechanisms based on my research thus far.</p>
                  </div>
                </div>
                <div class="blog-item">
                  <h3 class="font-semibold text-xl">Learning Beyond the Skies | 10/14/2024</h3>
                  <a href="#" class="read-more-btn" onclick="toggleContent(event, this)">Read More</a>
                  <div class="dropdown-content">
                    <p>This week, I participated in the ISM symposium. Coming into it, I was expecting to make connections with various engineers within the aerospace industry or artificial intelligence field. However, I only met one engineer in total yet still feel a sense of accomplishment from this experience. During my interviews, both the professionals I spoke with worked in administrative education, though our conversations found the crossroads of education and teamwork in engineering. With my first interview, I related my experience in robotics leadership to my interviewer's work as an Administrative Principal. This helped progress our discussion as I was able to ask questions about effective ways to handle team management. While this didn’t necessarily relate to my work in ISM, I was still able to make a valuable connection with someone outside of my field while building good professional communication skills. Past the professionalism aspect and the ISM symposium, I spent my week researching more about autonomous drone control and finalizing a list of hardware that I can further discuss with a mentor about. I hope that the skills I developed from the ISM symposium will bring ease in finding a mentor given how much it has elevated my soft skills. </p>
                  </div>
                </div>
                <div class="blog-item">
                  <h3 class="font-semibold text-xl">Ready, Set, Fly | 10/06/2024</h3>
                  <a href="#" class="read-more-btn" onclick="toggleContent(event, this)">Read More</a>
                  <div class="dropdown-content">
                    <p>This week, I’ve been able to dive into control strategies I was introduced to from my research assessment. Besides modeling, my main goal is to develop a control system that can either fully respond to environmental disturbances (such as wind) or create a multi controller system where each system is responsible for responding to a specific set of environmental disturbances. With my topic proposal, I was able to detail how my experience with PID control and OpenCv computer vision can be applied to my research this year, and how I wanted to expand on these learned topics. Besides the progress I’ve made in my research, I still have questions to pose to potential mentors. This includes what hardware (such as brushless motor types) I’ll specifically need and whether communication modules will be necessary for my project. This week, I was also able to create a list of possible hardware to purchase along with researching matlab controller designs, which will be the primary focus of my work. Next week, as the professional symposium approaches, I hope to speak with professionals in the engineering field who can provide some guidance for future work. All in all, my research so far has pushed me forward and has given me a good amount of questions to keep in mind for later on.
</p>
                  </div>
                </div>
                <div class="blog-item">
                  <h3 class="font-semibold text-xl">Into the Deep | 9/23/2024</h3>
                  <a href="#" class="read-more-btn" onclick="toggleContent(event, this)">Read More</a>
                  <div class="dropdown-content">
                    <p>Spending almost my entire weekend at robotics, I’ve been able to immerse myself with control systems. While there, I was able to speak with a few graduate mentors that introduced me to nonlinear control with I-PD. Essentially, it works by incorporating an external system rather than working in a closed system. In addition to this, beginning the research assessment has allowed me to gain even more insight into such control systems. Apart from this, I also need to start looking at what detection methods I’ll need to integrate for the machine learning module in my camera setup. For now, I’m going to continue drafting a basic design in AutoCAD to potentially show a mentor, while researching different system setups within MatLab (a popular software used to design systems) to get an idea of how I’ll go from here. Furthermore, my viewpoint has changed from previous blog posts. I've come to figure out that previous systems that I thought about were not used much in professional engineering, (Such as PIDF) which is a relief given the astounding amount of math calculations I would have to perform to get the system up and running. All in all, I hope to continue researching nonlinear control in the current research assessment to gain some expertise with diverse systems.
</p>
                  </div>
                </div>
                <div class="blog-item">
                  <h3 class="font-semibold text-xl">Flying Through the Start | 9/16/2024</h3>
                  <a href="#" class="read-more-btn" onclick="toggleContent(event, this)">Read More</a>
                  <div class="dropdown-content">
                    <p>This week, I’ve been able to narrow my topic down to a subject that I am familiar with: control theory. This encompasses the computational aspects of engineering and machine learning to make a system that relies on itself. My idea was based on the error brought by self driving cars. I want to work on a smaller scale to see how I can ultimately minimize error to make strides in autonomous vehicles. Thus, I landed on drone usage, which can be used in rescue operations where, because of distance, human control can’t be applied. Throughout this week, I’d like to get my modeling for a prototype completed and research what materials might work best in certain settings. However, I don’t want to get too ahead of myself which is why finalizing the model will come after meeting a mentor and running them down everything. In the meantime, I will study optimal control systems and ways to keep error to a minimum. Having experience with control systems already, I’ll most likely stick with the system I have the most experience with: PIDF, though this may change based on advice from mentors. My work in ISM has allowed me to deeply explore my interests in data and computation, leading me to a subject I am both passionate about and experienced in.</p>
                  </div>
                </div>
                <div class="blog-item">
                  <h3 class="font-semibold text-xl">Facing new beginnings | 9/9/2024</h3>
                  <a href="#" class="read-more-btn" onclick="toggleContent(event, this)">Read More</a>
                  <div class="dropdown-content">
                    <p>I am currently planning to focus on data science, either with its implications in math, space, or health. My experience in robotics along with other tech-based competitions will allow me to hit the ground running despite my unfamiliarity with the subtopics I’m looking through for data science. Apart from the artificial intelligence aspect of data science, I’m hoping to focus on deep learning while also looking through optimal datasets and processing methods to fit my needs. In ISM so far, I’ve been able to push myself to speak in front of a larger audience, which will allow me to not hold back when reaching out to potential mentors or when I’m presenting my final product. Throughout this week, I want to research the different applications of the sub-topics within my field to make a final decision on where to continue my research and with whom. By doing so, I’ll find a real-world application for my work which will help me narrow down my final topic. So far, I’ve been able to narrow down my broader topic of computer science/robotics to data science, though I’d like to find a more specific subject to pursue that will hopefully captivate future ISM researchers in the long run. All in all, I hope to dive deeper into my chosen field and look out for whatever has the best application from a research perspective.
</p>
                  </div>
                </div>
              </div>

          `;

    function toggleContent(event, link) {
      event.preventDefault();  // Prevents the page from scrolling to the top
      const dropdownContent = link.nextElementSibling;
      if (dropdownContent.style.display === "block") {
        dropdownContent.style.display = "none";
      } else {
        dropdownContent.style.display = "block";
      }
    }

    // Dark mode toggle functionality
    document.addEventListener('DOMContentLoaded', () => {
      const darkModeToggle = document.getElementById('darkModeToggle');
      
      // Check localStorage and apply theme
      if (localStorage.getItem('dark-mode') === 'true') {
        document.body.classList.add('dark-mode');
        darkModeToggle.innerHTML = '☀️ Light Mode';
      } else {
        document.body.classList.remove('dark-mode');
        darkModeToggle.innerHTML = '🌙 Dark Mode';
      }

      // Toggle dark mode on button click
      darkModeToggle.addEventListener('click', () => {
        const isDarkMode = document.body.classList.toggle('dark-mode');
        localStorage.setItem('dark-mode', isDarkMode);
        darkModeToggle.innerHTML = isDarkMode ? '☀️ Light Mode' : '🌙 Dark Mode';
      });
    });
